<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Django Docker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --primary-accent: #6f42c1;
            --success-accent: #20c997;
            --text-main: #2d3436;
        }

        body { 
            background: var(--bg-gradient); 
            min-height: 100vh;
            font-family: 'Inter', sans-serif; 
            color: var(--text-main);
            padding-bottom: 50px;
        }

        .todo-container { 
            max-width: 600px; 
            margin: 60px auto; 
            background: var(--glass-bg); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
        }

        /* Catchy Header Styling */
        .brand-title {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
            letter-spacing: -1px;
        }

        .task-item { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: none;
            border-left: 6px solid var(--primary-accent); 
            margin-bottom: 15px;
            background: #fff;
            border-radius: 12px !important;
        }

        .task-item:hover { 
            transform: translateX(10px); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .completed { 
            border-left: 6px solid var(--success-accent); 
            background: #f8f9fa;
        }

        .completed span { 
            text-decoration: line-through; 
            color: #adb5bd;
        }

        .btn-primary {
            background-color: var(--primary-accent);
            border: none;
        }

        .btn-primary:hover { background-color: #5a32a3; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="todo-container animate__animated animate__zoomIn">
        
        <div class="text-center mb-5 animate__animated animate__pulse animate__infinite animate__slow">
            <h1 class="display-4 fw-bold brand-title" style="color: var(--primary-accent);">
                🚀 TaskFlow <span class="text-secondary fw-light">Pro</span>
            </h1>
            <p class="text-muted lead">Streamline your goals, one task at a time.</p>
        </div>
        
        <form method="POST" class="mb-4 d-flex">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="title" class="form-control form-control-lg border-0 bg-light" placeholder="What's your next big goal?" required>
                <button type="submit" class="btn btn-primary px-4 shadow-sm fw-bold">Add Task</button>
            </div>
        </form>

        <div class="list-group">
            {% for task in tasks %}
            <div class="list-group-item d-flex justify-content-between align-items-center task-item p-3 shadow-sm {% if task.completed %}completed animate__animated animate__fadeIn{% else %}animate__animated animate__backInRight{% endif %}">
                <span class="fs-5 fw-medium">{{ task.title }}</span>
                <div class="btn-group">
                    <a href="{% url 'toggle_task' task.id %}" class="btn {% if task.completed %}btn-success{% else %}btn-outline-primary{% endif %} rounded-pill px-3 me-2 transition-all">
                        {% if task.completed %} ✓ Done {% else %} Complete {% endif %}
                    </a>
                    <a href="{% url 'delete_task' task.id %}" class="btn btn-outline-danger rounded-pill px-3" onclick="return confirm('Delete this task?')">
                        Delete
                    </a>
                </div>
            </div>
            {% empty %}
            <div class="text-center py-5">
                <p class="text-muted fs-5 italic">Your slate is clean. Start building!</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
